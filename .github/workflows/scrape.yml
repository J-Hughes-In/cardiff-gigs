name: Scrape Cardiff Gigs

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      venue:
        description: 'Venue name to scrape (leave blank to scrape all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: |
          if [ -n "${{ inputs.venue }}" ]; then
            node scrape.js --venue "${{ inputs.venue }}"
          else
            npm run scrape
          fi

      - name: Enrich comedian data
        # Run when: no specific venue is requested (full scrape), or the venue is one
        # that lists comedy acts. Also limited to the 08:00 scheduled run so it
        # doesn't fire on every cron tick.
        if: |
          github.event_name == 'workflow_dispatch' && (
            inputs.venue == '' ||
            inputs.venue == 'WMC' ||
            inputs.venue == 'New Theatre' ||
            inputs.venue == 'Sherman' ||
            inputs.venue == 'Globe' ||
            inputs.venue == 'Tramshed'
          ) ||
          github.event_name == 'schedule' && startsWith(github.event.schedule, '0 8')
        run: node comedians.js
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add events.json comedians.json comedian-review.json
          git diff --staged --quiet || git commit -m "Update events $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
