name: Scrape Cardiff Gigs

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      venue:
        description: 'Venue name to scrape (leave blank to scrape all)'
        required: false
        default: ''

concurrency:
  group: update-events
  cancel-in-progress: false


permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: |
          if [ -n "${{ inputs.venue }}" ]; then
            node scrape.js --venue "${{ inputs.venue }}"
          else
            npm run scrape
          fi

      - name: Enrich comedian data
        # Run once a day on the 08:00 UTC scheduled cron only.
        # Skipped on manual dispatches and the 14:00/20:00 scheduled runs.
        if: github.event_name == 'schedule' && startsWith(github.event.schedule, '0 8')
        run: node comedians.js
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add events.json comedians.json comedian-review.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update events $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
